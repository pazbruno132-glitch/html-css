<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
        }
        div.padrao{
            border: 2px solid black;
            width: 600px;
            height: 450px;
            background-color: lightgray;
        }

        #d1{
            background-image: url(imagens/wallpaper003.jpg);
            background-position: left top;
        }

        #d2{
            background-image: url(imagens/wallpaper003.jpg);
            background-position: right bottom;
        }

        #d3{
            background-image: url(imagens/wallpaper003.jpg);
            background-position: center top;
        }

        #d4{
            background-image: url(imagens/wallpaper003.jpg);
            background-position: center center;
        }
    </style>
</head>
<body>
    <h1>Posição de um background</h1>

    <h2>background-position: left top</h2>
    <div class="padrao" id="d1">

    </div>

    <h2>background-position: right bottom;</h2>
    <div class="padrao" id="d2">

    </div>

    <h2>background-position: center top;</h2>
    <div class="padrao" id="d3">

    </div>

    <h2>background-position: center center;</h2>
    <div class="padrao" id="d4">

    </div>
</body>
</html>
