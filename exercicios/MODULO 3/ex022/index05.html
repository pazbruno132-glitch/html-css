<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fundo</title>
    <style>
        div.container{
            position: relative;
            background-color: lightgrey;
            width: 650px;
            height: 500px;
            border: 5px solid black;
        }

        div.conteudo{
            position: absolute;
            background-color: gray;
            width: 250px;
            height: 100px;
            font-family: Arial, Helvetica, sans-serif;
            font-weight: bold;
            padding: 10px;

            top: 50%;
            left: 50%;

            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="conteudo">
            <h1>Texto Centralizado</h1>
        </div>
    </div>
</body>
</html>
